<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Actualités – Twirling Bâton Trets</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .actus-list {
      display: grid;
      gap: 18px;
    }

    .actu-card {
      display: grid;
      gap: 14px;
    }

    .actu-date {
      display: inline-block;
      font-size: 14px;
      font-weight: 700;
      color: var(--muted, #64748b);
      margin-bottom: 4px;
    }

    .actu-title {
      margin: 0;
    }

    .actu-resume {
      margin: 0;
      white-space: pre-line;
    }

    .actu-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 6px;
    }

    .actu-thumb {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid var(--line);
      cursor: pointer;
      background: #f1f5f9;
      display: block;
    }

    .actu-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 24px 12px;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 60;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: min(92vw, 1400px);
      max-height: 90vh;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,.4);
      display: block;
    }

    .lb-close,
    .lb-prev,
    .lb-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,.12);
      backdrop-filter: blur(6px);
      color: #fff;
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 999px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      user-select: none;
    }

    .lb-close {
      top: 24px;
      right: 24px;
      transform: none;
      width: 42px;
      height: 42px;
      font-size: 18px;
    }

    .lb-prev { left: 24px; }
    .lb-next { right: 24px; }

    .lb-counter {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-weight: 700;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.18);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 14px;
    }

    @media (max-width: 700px) {
      .lb-prev,
      .lb-next {
        display: none;
      }

      .actu-gallery {
        grid-template-columns: repeat(2, 1fr);
      }

      .actu-thumb {
        height: 140px;
      }
    }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <script src="assets/inject-header.js" defer></script>

  <section class="hero wrap">
    <h1>Actualités</h1>
    <p>Suivez les dernières nouvelles du Twirling Bâton Trets.</p>
  </section>

  <main class="wrap">
    <section class="card">
      <div id="actusList" class="actus-list">
        <div class="empty-state">
          <p class="muted">Chargement des actualités…</p>
        </div>
      </div>
    </section>
  </main>

  <div id="lightbox" class="lightbox" aria-modal="true" role="dialog" aria-label="Agrandissement photo">
    <button class="lb-close" id="lbClose" aria-label="Fermer">✕</button>
    <button class="lb-prev" id="lbPrev" aria-label="Précédente">‹</button>
    <img id="lbImg" alt="Photo actualité" />
    <button class="lb-next" id="lbNext" aria-label="Suivante">›</button>
    <div class="lb-counter" id="lbCount">1 / 1</div>
  </div>

  <div id="site-footer"></div>
  <script src="assets/inject-footer.js" defer></script>

  <script>
    (function () {
      var allImages = [];
      var currentIndex = 0;

      var list = document.getElementById("actusList");
      var lightbox = document.getElementById("lightbox");
      var lbImg = document.getElementById("lbImg");
      var lbCount = document.getElementById("lbCount");
      var lbPrev = document.getElementById("lbPrev");
      var lbNext = document.getElementById("lbNext");
      var lbClose = document.getElementById("lbClose");

      function escapeHtml(str) {
        return String(str || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function formatDate(isoDate) {
        if (!isoDate) return "";
        var parts = isoDate.split("-");
        if (parts.length !== 3) return isoDate;
        return parts[2] + "/" + parts[1] + "/" + parts[0];
      }

      function openAt(index) {
        if (!allImages.length) return;
        currentIndex = (index + allImages.length) % allImages.length;
        lbImg.src = allImages[currentIndex].src;
        lbImg.alt = allImages[currentIndex].alt || "Photo actualité";
        lbCount.textContent = (currentIndex + 1) + " / " + allImages.length;
        lightbox.classList.add("open");
      }

      function closeLightbox() {
        lightbox.classList.remove("open");
        lbImg.src = "";
      }

      function prevImage() {
        openAt(currentIndex - 1);
      }

      function nextImage() {
        openAt(currentIndex + 1);
      }

      fetch("actualites-2026.json")
        .then(function (r) {
          if (!r.ok) throw new Error("Impossible de charger actualites.json");
          return r.json();
        })
        .then(function (items) {
          if (!Array.isArray(items) || items.length === 0) {
            list.innerHTML =
              '<div class="empty-state"><p class="muted">Aucune actualité n’est disponible pour le moment.</p></div>';
            return;
          }

          items.sort(function (a, b) {
            return String(b.date || "").localeCompare(String(a.date || ""));
          });

          allImages = [];

          list.innerHTML = items.map(function (item, actIndex) {
            var images = Array.isArray(item.images) ? item.images : [];

            var galleryHtml = "";
            if (images.length) {
              galleryHtml =
                '<div class="actu-gallery">' +
                images.map(function (src, imgIndex) {
                  var globalIndex = allImages.length;
                  allImages.push({
                    src: src,
                    alt: item.titre ? ("Photo - " + item.titre) : "Photo actualité"
                  });

                  return (
                    '<img class="actu-thumb" ' +
                    'src="' + escapeHtml(src) + '" ' +
                    'alt="' + escapeHtml(item.titre || "Actualité") + '" ' +
                    'loading="lazy" ' +
                    'data-global-idx="' + globalIndex + '" ' +
                    '/>'
                  );
                }).join("") +
                '</div>';
            }

            var buttonHtml = item.lien
              ? '<div class="actu-actions"><a class="button" href="' + escapeHtml(item.lien) + '" target="_blank" rel="noopener">Voir sur Facebook</a></div>'
              : '';

            return (
              '<article class="card actu-card">' +
                '<div>' +
                  '<span class="actu-date">' + escapeHtml(formatDate(item.date)) + '</span>' +
                  '<h2 class="actu-title">' + escapeHtml(item.titre || "Actualité") + '</h2>' +
                '</div>' +
                '<p class="actu-resume">' + escapeHtml(item.resume || "") + '</p>' +
                galleryHtml +
                buttonHtml +
              '</article>'
            );
          }).join("");

          list.addEventListener("click", function (e) {
            var t = e.target;
            if (t && t.classList.contains("actu-thumb")) {
              openAt(parseInt(t.getAttribute("data-global-idx"), 10) || 0);
            }
          });
        })
        .catch(function () {
          list.innerHTML =
            '<div class="empty-state"><p class="muted">Impossible de charger les actualités.</p></div>';
        });

      lbPrev.addEventListener("click", function (e) {
        e.stopPropagation();
        prevImage();
      });

      lbNext.addEventListener("click", function (e) {
        e.stopPropagation();
        nextImage();
      });

      lbClose.addEventListener("click", function (e) {
        e.stopPropagation();
        closeLightbox();
      });

      lightbox.addEventListener("click", function (e) {
        if (e.target === lightbox) closeLightbox();
      });

      document.addEventListener("keydown", function (e) {
        if (!lightbox.classList.contains("open")) return;
        if (e.key === "Escape") closeLightbox();
        if (e.key === "ArrowLeft") prevImage();
        if (e.key === "ArrowRight") nextImage();
      });
    })();
  </script>
</body>
</html>
